<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kişisel Kasa</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="Kişisel Kasa uygulaması">
      <section class="screen lock-screen" id="lockScreen">
        <div class="status-bar">
          <span>09:41</span>
          <span>LTE 100%</span>
        </div>
        <div class="lock-art" aria-hidden="true">
          <div class="orbital orbital-one"></div>
          <div class="orbital orbital-two"></div>
          <div class="lock-mark">K</div>
        </div>
        <p class="eyebrow">Kişisel kasa</p>
        <h1 id="lockTitle">PIN belirle</h1>
        <p class="lock-copy" id="lockCopy">Sadece senin cihazında çalışan özel alanın için 4-8 haneli bir PIN seç.</p>
        <form class="pin-form" id="pinForm">
          <label class="sr-only" for="pinInput">PIN</label>
          <input id="pinInput" type="password" inputmode="numeric" minlength="4" maxlength="8" autocomplete="current-password" placeholder="PIN" />
          <button type="submit" id="unlockButton">Devam</button>
        </form>
        <p class="message" id="lockMessage" role="status"></p>
      </section>

      <section class="screen app-screen hidden" id="appScreen">
        <div class="status-bar app-status">
          <span>09:41</span>
          <span>Offline</span>
        </div>
        <header class="app-header">
          <div>
            <p class="eyebrow">Güvenli alan</p>
            <h2>ÖYKÜMÜN Kasası</h2>
          </div>
          <button class="icon-button" id="lockButton" type="button" aria-label="Kilitle">⌁</button>
        </header>

        <nav class="tabs" aria-label="Bolumler">
          <button class="tab active" type="button" data-tab="passwords">Şifreler</button>
          <button class="tab" type="button" data-tab="memories">Anılar</button>
        </nav>

        <section class="content-panel" id="passwordsPanel">
          <div class="section-title">
            <div>
              <h3>Şifreler</h3>
              <p>Hesaplarını tek yerde sakla.</p>
            </div>
            <button class="small-button" id="showPasswordForm" type="button">Ekle</button>
          </div>

          <form class="entry-form hidden" id="passwordForm">
            <input id="siteInput" type="text" placeholder="Uygulama / site" autocomplete="off" />
            <input id="userInput" type="text" placeholder="Kullanıcı adı" autocomplete="off" />
            <input id="passwordInput" type="password" placeholder="Şifre" autocomplete="off" />
            <textarea id="noteInput" placeholder="Not"></textarea>
            <button type="submit">Şifreyi kaydet</button>
          </form>

          <div class="list" id="passwordList"></div>
        </section>

        <section class="content-panel hidden" id="memoriesPanel">
          <div class="section-title">
            <div>
              <h3>Anılar</h3>
              <p>Özel notlarını ve tarihlerini sakla.</p>
            </div>
            <button class="small-button" id="showMemoryForm" type="button">Ekle</button>
          </div>

          <form class="entry-form hidden" id="memoryForm">
            <input id="memoryTitleInput" type="text" placeholder="Anı başlığı" autocomplete="off" />
            <input id="memoryDateInput" type="date" />
            <textarea id="memoryTextInput" placeholder="Ne oldu, nasıl hissettin?"></textarea>
            <button type="submit">Anıyı kaydet</button>
          </form>

          <div class="list" id="memoryList"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
